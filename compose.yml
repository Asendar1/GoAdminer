services:
  goadminer:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    # Mount a SQLite file if needed:
    # volumes:
    #   - ./data:/data
    # For connecting to a host Postgres from Docker:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  # Optional: Postgres for testing
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
