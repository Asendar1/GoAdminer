name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26

    - name: Install SQLite
      run: sudo apt-get update && sudo apt-get install -y sqlite3

    - name: Vet
      run: go vet ./...

    - name: Build
      run: go build -v ./...

    - name: Test (unit)
      run: go test -v ./...

    - name: Smoke test — SQLite
      run: |
        # Create a test SQLite database with a table
        sqlite3 /tmp/test.db "CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT, email TEXT);"
        sqlite3 /tmp/test.db "INSERT INTO users (name, email) VALUES ('Alice', 'alice@test.com'), ('Bob', 'bob@test.com');"

        # Start server in background
        ./goadminer -dev &
        SERVER_PID=$!
        sleep 1

        # Connect via API
        curl -s -X POST http://localhost:8080/api/connect \
          -H "Content-Type: application/json" \
          -d '{"driver":"sqlite","filepath":"/tmp/test.db"}' > /tmp/resp.json

        SESSION_ID=$(cat /tmp/resp.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('session_id',''))")
        if [ -z "$SESSION_ID" ]; then
          echo "FAIL: no session_id from SQLite connect"
          cat /tmp/resp.json
          kill $SERVER_PID 2>/dev/null
          exit 1
        fi
        echo "SQLite session: $SESSION_ID"

        # List tables
        curl -s -X GET http://localhost:8080/api/tables \
          -H "X-Session-ID: $SESSION_ID" > /tmp/tables.json
        echo "Tables: $(cat /tmp/tables.json)"

        # Browse rows
        curl -s -X GET http://localhost:8080/api/tables/users/rows \
          -H "X-Session-ID: $SESSION_ID" > /tmp/rows.json
        echo "Rows: $(cat /tmp/rows.json)"

        kill $SERVER_PID 2>/dev/null
        echo "--- SQLite smoke test PASSED ---"

    - name: Smoke test — PostgreSQL
      run: |
        # Start server
        ./goadminer -dev &
        SERVER_PID=$!
        sleep 1

        # Create a test table
        PGPASSWORD=admin psql -h localhost -U admin -d testdb -c "
          CREATE TABLE users (id SERIAL PRIMARY KEY, name TEXT, email TEXT);
          INSERT INTO users (name, email) VALUES ('Alice', 'alice@test.com'), ('Bob', 'bob@test.com');
        "

        # Connect via API
        curl -s -X POST http://localhost:8080/api/connect \
          -H "Content-Type: application/json" \
          -d '{"driver":"postgres","host":"localhost","port":5432,"user":"admin","password":"admin","database":"testdb","schema":"public","ssl_mode":"disable"}' > /tmp/resp.json

        SESSION_ID=$(cat /tmp/resp.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('session_id',''))")
        if [ -z "$SESSION_ID" ]; then
          echo "FAIL: no session_id from PG connect"
          cat /tmp/resp.json
          kill $SERVER_PID 2>/dev/null
          exit 1
        fi
        echo "PG session: $SESSION_ID"

        # List tables
        curl -s -X GET http://localhost:8080/api/tables \
          -H "X-Session-ID: $SESSION_ID" > /tmp/tables.json
        echo "Tables: $(cat /tmp/tables.json)"

        # Browse rows
        curl -s -X GET "http://localhost:8080/api/tables/users/rows?page=1&per_page=10" \
          -H "X-Session-ID: $SESSION_ID" > /tmp/rows.json
        echo "Rows: $(cat /tmp/rows.json)"

        # Run a raw query
        curl -s -X POST http://localhost:8080/api/query \
          -H "Content-Type: application/json" \
          -H "X-Session-ID: $SESSION_ID" \
          -d '{"sql":"SELECT count(*) FROM users"}' > /tmp/query.json
        echo "Query: $(cat /tmp/query.json)"

        kill $SERVER_PID 2>/dev/null
        echo "--- PG smoke test PASSED ---"
